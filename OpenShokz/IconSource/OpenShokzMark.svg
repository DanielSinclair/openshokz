    <path d="M 248 360 C 248 248 360 176 512 176 C 664 176 776 248 776 360" stroke-width="88"/>
    <!-- Left hook -->
    <path d="M 248 360 L 248 500 C 248 560 288 600 340 600 L 380 600" stroke-width="80"/>
    <!-- Right hook -->
    <path d="M 776 360 L 776 500 C 776 560 736 600 684 600 L 644 600" stroke-width="80"/>
    <!-- Left transducer -->
    <path d="M 380 600 C 380 660 400 720 440 760" stroke-width="72"/>
    <!-- Right transducer -->
    <path d="M 644 600 C 644 660 624 720 584 760" stroke-width="72"/>
    <!-- Sound wave -->
    <path d="M 300 820 C 380 740 460 900 540 820 C 620 740 700 900 724 820" stroke-width="64"/>
  </g>
</svg>
