<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    background:
      radial-gradient(900px 900px at 85% 115%, #0a2a4f 0%, rgba(10,42,79,0) 60%),
      linear-gradient(140deg,#0b2540 0%, #123a63 55%, #0e6b7a 100%);
    color:#f4f8ff; overflow:hidden;
    display:flex; align-items:center; gap:60px; padding:0 92px;
  }
  /* faint lane lines */
  body::before {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.05) 0 2px, transparent 2px 88px);
    pointer-events:none;
  }
  .icon {
    width:290px; height:290px; border-radius:64px; flex:none; position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.35), 0 40px 90px rgba(0,0,0,.4);
  }
  .txt { position:relative; }
  h1 { font-size:88px; font-weight:800; letter-spacing:-.03em; line-height:1; }
  .tag { font-size:36px; font-weight:560; color:#c7dbff; margin-top:20px; line-height:1.28; max-width:560px; }
  .row { display:flex; align-items:center; gap:14px; margin-top:34px; font-size:22px; color:#9fb6d9; font-weight:560; }
  .chip { padding:8px 18px; border-radius:999px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); }
  .free { color:#5ee7b0; }
</style></head>
<body>
  <img class="icon" src="icon.png" alt="">
  <div class="txt">
    <h1>OpenShokz</h1>
    <div class="tag">Load YouTube videos and podcasts onto your Shokz — for the pool.</div>
    <div class="row"><span class="chip">macOS</span><span class="free">Free &amp; open source</span></div>
  </div>
</body></html>
