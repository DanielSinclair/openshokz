<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    background:
      radial-gradient(1000px 700px at 78% -10%, #dbe7ff 0%, rgba(219,231,255,0) 60%),
      radial-gradient(900px 700px at 0% 120%, #e7f7f0 0%, rgba(231,247,240,0) 55%),
      #eef1f6;
    color:#171b22;
    display:flex; align-items:center; gap:64px;
    padding:0 96px;
    overflow:hidden;
  }
  .icon {
    width:300px; height:300px; border-radius:66px; flex:none;
    box-shadow:0 8px 24px rgba(20,30,50,.14), 0 40px 90px rgba(20,30,50,.22);
  }
  .txt { display:flex; flex-direction:column; }
  h1 { font-size:92px; font-weight:800; letter-spacing:-.03em; line-height:1; }
  .tag { font-size:38px; font-weight:560; color:#3a4453; margin-top:22px; line-height:1.25; max-width:600px; }
  .sub { display:flex; align-items:center; gap:14px; margin-top:34px; font-size:24px; color:#6b7482; font-weight:560; }
  .pill { padding:8px 18px; border-radius:999px; background:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.9);
          box-shadow:0 2px 8px rgba(20,30,50,.08); }
  .free { color:#1f8a4c; }
</style></head>
<body>
  <img class="icon" src="icon.png" alt="">
  <div class="txt">
    <h1>OpenShokz</h1>
    <div class="tag">Download YouTube videos and podcasts to your&nbsp;Shokz</div>
    <div class="sub">
      <span class="pill">OpenSwim · OpenSwim&nbsp;Pro · Xtrainerz</span>
      <span class="free">Free &amp; open&nbsp;source</span>
    </div>
  </div>
</body></html>
