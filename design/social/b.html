<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
    background:
      radial-gradient(1100px 800px at 50% -20%, #dce9ff 0%, rgba(220,233,255,0) 62%),
      #eef1f6;
    color:#171b22;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; overflow:hidden;
  }
  .icon {
    width:172px; height:172px; border-radius:40px;
    box-shadow:0 6px 18px rgba(20,30,50,.14), 0 26px 60px rgba(20,30,50,.22);
  }
  h1 { font-size:66px; font-weight:800; letter-spacing:-.03em; margin-top:30px; }
  .tag { font-size:44px; font-weight:640; letter-spacing:-.02em; margin-top:14px; line-height:1.15; max-width:940px; }
  .grad { background:linear-gradient(90deg,#2f6bff,#00b3a4); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { margin-top:26px; font-size:24px; color:#6b7482; font-weight:560; }
  .free { color:#1f8a4c; font-weight:640; }
</style></head>
<body>
  <img class="icon" src="icon.png" alt="">
  <h1>OpenShokz</h1>
  <div class="tag">Download <span class="grad">YouTube &amp; podcasts</span><br>to your Shokz swim headphones</div>
  <div class="sub"><span class="free">Free &amp; open source</span> · OpenSwim · OpenSwim Pro · Xtrainerz</div>
</body></html>
